name: cluster-image

on:
  push:
    branches: [main, master, "feat/range-sharding"]
    tags: ["v*"]
    paths:
      - "Dockerfile.cluster"
      - "Cargo.toml"
      - "Cargo.lock"
      - "src/**"
      - "crates/azcp-cluster/**"
      - ".github/workflows/cluster-image.yml"
  pull_request:
    paths:
      - "Dockerfile.cluster"
      - "crates/azcp-cluster/**"
      - ".github/workflows/cluster-image.yml"
  workflow_dispatch:

permissions:
  contents: read
  packages: write

env:
  IMAGE: ghcr.io/${{ github.repository }}/azcp-cluster

jobs:
  build:
    strategy:
      fail-fast: true
      matrix:
        include:
          - runner: ubuntu-24.04
            platform: linux/amd64
            arch: amd64
          - runner: ubuntu-24.04-arm
            platform: linux/arm64
            arch: arm64
    runs-on: ${{ matrix.runner }}
    outputs:
      digest-amd64: ${{ steps.export.outputs.digest-amd64 }}
      digest-arm64: ${{ steps.export.outputs.digest-arm64 }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build (and push on non-PR) per-arch image
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.cluster
          platforms: ${{ matrix.platform }}
          push: ${{ github.event_name != 'pull_request' }}
          provenance: false
          outputs: ${{ github.event_name != 'pull_request' && format('type=image,name={0},push-by-digest=true,name-canonical=true,push=true', env.IMAGE) || 'type=docker' }}
          cache-from: type=gha,scope=${{ matrix.arch }}
          cache-to: type=gha,scope=${{ matrix.arch }},mode=max

      - name: Export digest
        if: github.event_name != 'pull_request'
        id: export
        run: |
          mkdir -p /tmp/digests
          digest="${{ steps.build.outputs.digest }}"
          touch "/tmp/digests/${digest#sha256:}"
          echo "digest-${{ matrix.arch }}=${digest}" >> "$GITHUB_OUTPUT"

      - name: Upload digest
        if: github.event_name != 'pull_request'
        uses: actions/upload-artifact@v4
        with:
          name: digests-${{ matrix.arch }}
          path: /tmp/digests/*
          if-no-files-found: error
          retention-days: 1

  manifest:
    if: github.event_name != 'pull_request'
    needs: build
    runs-on: ubuntu-24.04
    steps:
      - name: Download digests
        uses: actions/download-artifact@v4
        with:
          path: /tmp/digests
          pattern: digests-*
          merge-multiple: true

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute tags
        id: tags
        run: |
          set -euo pipefail
          tags=()
          if [[ "${GITHUB_REF}" == refs/tags/v* ]]; then
            v="${GITHUB_REF#refs/tags/}"
            tags+=("--tag" "${IMAGE}:${v}")
            tags+=("--tag" "${IMAGE}:latest")
          else
            sha="${GITHUB_SHA::12}"
            tags+=("--tag" "${IMAGE}:${GITHUB_REF_NAME//\//-}-${sha}")
            if [[ "${GITHUB_REF_NAME}" == "main" || "${GITHUB_REF_NAME}" == "master" ]]; then
              tags+=("--tag" "${IMAGE}:edge")
            fi
          fi
          printf '%s\n' "${tags[@]}" > /tmp/tags.txt

      - name: Create and push manifest list
        run: |
          set -euo pipefail
          mapfile -t tag_args < /tmp/tags.txt
          digests=()
          for f in /tmp/digests/*; do
            digests+=("${IMAGE}@sha256:$(basename "$f")")
          done
          docker buildx imagetools create "${tag_args[@]}" "${digests[@]}"

      - name: Inspect
        run: |
          set -euo pipefail
          mapfile -t tag_args < /tmp/tags.txt
          # First tag in pairs (after --tag): index 1, 3, 5...
          first_tag="${tag_args[1]}"
          docker buildx imagetools inspect "$first_tag"
