name: cluster-image

on:
  push:
    branches: [main, master]
    tags: ["v*"]
    paths:
      - "Dockerfile.cluster"
      - "Cargo.toml"
      - "Cargo.lock"
      - "src/**"
      - "crates/azcp-cluster/**"
      - ".github/workflows/cluster-image.yml"
  pull_request:
    paths:
      - "Dockerfile.cluster"
      - "crates/azcp-cluster/**"
      - ".github/workflows/cluster-image.yml"
  workflow_dispatch:

permissions:
  contents: read
  packages: write

env:
  IMAGE: ghcr.io/${{ github.repository }}/azcp-cluster

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute tags
        id: tags
        run: |
          set -euo pipefail
          tags=()
          if [[ "${GITHUB_REF}" == refs/tags/v* ]]; then
            v="${GITHUB_REF#refs/tags/}"
            tags+=("${IMAGE}:${v}")
            tags+=("${IMAGE}:latest")
          else
            sha="${GITHUB_SHA::12}"
            tags+=("${IMAGE}:${GITHUB_REF_NAME//\//-}-${sha}")
            if [[ "${GITHUB_REF_NAME}" == "main" || "${GITHUB_REF_NAME}" == "master" ]]; then
              tags+=("${IMAGE}:edge")
            fi
          fi
          ( IFS=,; echo "tags=${tags[*]}" ) >> "$GITHUB_OUTPUT"

      - name: Build (and push on non-PR)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.cluster
          platforms: linux/amd64,linux/arm64
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.tags.outputs.tags }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
